{% set name = "quarTeT" %}
{% set version = "1.3.0" %}
{% set sha256 = "c9e18aefed3828c2ee1d0eecd3951bfccd9b28b7b6502fd827626b9c0d16b686" %}

package:
  name: {{ name|lower }}-bio
  version: {{ version }}

source:
  url: https://github.com/aaranyue/quarTeT/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv
  run_exports:
    - {{ pin_subpackage('quartet-bio', max_pin="x") }}

requirements:
  build:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7
    - r-base
    - r-rideogram
    - r-ggplot2
    - gnuplot
    - unimap
    - minimap2
    - mummer4
    - trf
    - cd-hit
    - blast
    - tidk

test:
  imports:
    - quartet
  commands:
    - quartet --help

about:
  summary: "A telomere-to-telomere toolkit for gap-free genome assembly and centromeric repeat identification."
  home: "https://github.com/aaranyue/quarTeT"
  license: MIT
  license_family: MIT
  dev_url: "https://github.com/aaranyue/quarTeT"
  doc_url: "https://github.com/aaranyue/quarTeT/blob/main/README.md"

extra:
  identifiers:
    - doi:10.1093/hr/uhad127
    - biotools:quartet
